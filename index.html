<body>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── responsive hook ── */
    function useIsMobile(bp = 768) {
      const [m, setM] = useState(window.innerWidth <= bp);
      useEffect(() => {
        const h = () => setM(window.innerWidth <= bp);
        window.addEventListener("resize", h);
        return () => window.removeEventListener("resize", h);
      }, [bp]);
      return m;
    }

    /* ── fires once when element enters viewport ── */
    function useInView(opts = {}) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { setVisible(true); io.disconnect(); } },
          { threshold: opts.threshold ?? 0.1 }
        );
        io.observe(el);
        return () => io.disconnect();
      }, []);
      return [ref, visible];
    }

    /* ── animated counter ── */
    function AnimCount({ target, duration = 1200 }) {
      const [val, setVal] = useState(0);
      const [ref, vis] = useInView();
      useEffect(() => {
        if (!vis) return;
        let start = null;
        const step = (ts) => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          setVal(Math.floor(p * target));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [vis]);
      return <span ref={ref}>{val}</span>;
    }

    /* ── floating particles ── */
    function Particles({ count = 20 }) {
      const dots = Array.from({ length: count }, (_, i) => ({
        id: i, x: Math.random() * 100, y: Math.random() * 100,
        s: Math.random() * 2 + 1, d: Math.random() * 20 + 10, del: Math.random() * 5,
      }));
      return (
        <div style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none", zIndex: 0 }}>
          {dots.map((d) => (
            <div key={d.id} style={{
              position: "absolute", left: `${d.x}%`, top: `${d.y}%`,
              width: d.s, height: d.s, borderRadius: "50%",
              background: "rgba(200,121,65,0.25)",
              animation: `floatUp ${d.d}s ${d.del}s linear infinite`,
            }} />
          ))}
        </div>
      );
    }

    /* ── scroll animation wrapper ── */
    function Fade({ children, delay = 0, style = {}, threshold = 0.08 }) {
      const [ref, vis] = useInView({ threshold });
      return (
        <div ref={ref} style={{
          ...style,
          opacity: vis ? 1 : 0,
          transform: vis ? "translateY(0)" : "translateY(40px)",
          transition: `opacity 0.8s ${delay}s cubic-bezier(.16,1,.3,1), transform 0.8s ${delay}s cubic-bezier(.16,1,.3,1)`,
        }}>
          {children}
        </div>
      );
    }

    /* ── glassmorphism card ── */
    function GlassCard({ children, style = {} }) {
      return (
        <div style={{

          {children}
        </div>
      );

    }
